name: 'Standard Security Guard'
description: 'Scans for vulnerabilities and secrets'

# Define what inputs the developer needs to provide
inputs:
  image-name:
    description: 'The name of the Docker image to scan'
    required: true

runs:
  using: 'composite' # This tells GitHub this is a collection of steps
  steps:
    - name: Run our Security Script
      shell: bash
      run: |
        # Use github.action_path to find the script inside THIS repo
        chmod +x ${{ github.action_path }}/scripts/scan.sh
        ${{ github.action_path }}/scripts/scan.sh ${{ inputs.image-name }} 
